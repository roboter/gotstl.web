<div class="jscad-container">
  <div id="header">
    <div id="errordiv">hello</div>
  </div>

  <!-- setup display of the viewer, i.e. canvas -->
  <div oncontextmenu="return false;" id="viewerContext">

  </div>
  <!-- design-url="assets/examples/logo.jscad" -->
  <!-- setup display of the status, as required by OpenJSCAD.js -->
  <!-- set display: block to display this -->

  <div class="statusdiv" style="display: block;"><span>Ready. Rendered in 465ms</span>
  <div style="float: right;">
    <button style="display: none;">Abort</button>
    <select style="display: none;">
      <option>Element #1</option>
    </select>
    <select id="formatDropdown" style="display: inline;">
      <option value="stl">STL</option>
      <option value="x3d">X3D</option>
      </select><button style="display: inline;">Generate STL</button>
      <a style="display: none;"></a>
    </div>
    <div><input type="checkbox" id="cb_faces"><label for="cb_faces">surfaces </label><input type="checkbox"  id="cb_lines"><label for="cb_lines">lines </label></div>

  </div>
</div>
<div id="tail" style="display: none;">
  <div id="statusdiv"></div>
</div>
<div id="parameterstable">

</div>

<button id="button" (click)="onUpdate()">Update</button>
<button id="button" (click)="generateOutputFile()">Generate STL</button>
@if (outputFile) {
  <a download="openjscad.stl" [href]="sanitizeImageUrl(outputFile)"
  class="downloadOutputFileLink">download</a>
}
