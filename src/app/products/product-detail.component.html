<div class="card edit-detail">
    <header class="card-header">
        <p class="card-header-title">
            {{ editingProduct.name }}
            &nbsp;
        </p>
    </header>
    <div class="card-content">
        <div class="content">
            
            <div oncontextmenu="return false;" id="viewerContext">

            </div>
           
            <div id="parameterstable">
            </div>
           
            <button id="button" (click)="onUpdate()">Update</button>
            <button id="button" (click)="generateOutputFile()">Generate STL</button>
            <a *ngIf="outputFile" download="openjscad.stl" [href]="sanitizeImageUrl(outputFile)"
                class="downloadOutputFileLink">download</a>
            <textarea rows="14" name="code" [(ngModel)]="editingProduct.code" style="width: 100%;"></textarea>
            <!-- <p>Hello {{ editingProduct.code }}!</p> -->

                <label class="label" for="id"> id </label>
                <input name="id" class="input" type="text" [(ngModel)]="editingProduct.id"
                    placeholder="e.g. ProductColleen" readOnly />
            </div>
            <div class="field">
                <label class="label" for="name"> name </label>
                <input name="name" class="input" type="text" [(ngModel)]="editingProduct.name" placeholder="Oranges" />
            </div>
            <div class="field">
                <label class="label" for="description"> description </label>
                <input name="description" class="input" type="text" [(ngModel)]="editingProduct.description"
                    placeholder="box" />
            </div>
           -->
        </div>
    </div>
    <footer class="card-footer">
        <app-button-footer class="card-footer-item" [className]="'cancel-button'" [iconClasses]="'fas fa-undo'"
            (clicked)="clear()" label="Cancel" [item]="editingProduct"></app-button-footer>
        <!-- <app-button-footer class="card-footer-item" [className]="'save-button'" [iconClasses]="'fas fa-save'"
            (clicked)="saveProduct()" label="Save" [item]="editingProduct"></app-button-footer> -->
    </footer>
</div>
